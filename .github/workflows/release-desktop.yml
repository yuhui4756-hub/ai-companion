name: Release desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release
        required: true
        default: v0.1.3
      expected_version:
        description: Expected package/release version
        required: true
        default: 0.1.3
      expected_schema_version:
        description: Expected packaged backend schema version
        required: true
        default: "4"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r backend\requirements.txt -r backend\requirements-build.txt
          $pythonPath = (Get-Command python).Source
          "PYTHON=$pythonPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run backend tests
        shell: pwsh
        run: python -m pytest backend\tests

      - name: Build desktop release candidate
        shell: pwsh
        run: npm run desktop:dist

      - name: Verify release candidate
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\verify-release-candidate.ps1 -ExpectedVersion "${{ inputs.expected_version }}" -ExpectedSchemaVersion "${{ inputs.expected_schema_version }}" -FailOnOtherInstallers

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          $installer = "release-v06d\suoyi-setup-$env:EXPECTED_VERSION.exe"
          $blockmap = "$installer.blockmap"
          $latest = "release-v06d\latest.yml"

          if (-not (gh release view $env:TAG --repo $env:GITHUB_REPOSITORY)) {
            gh release create $env:TAG --repo $env:GITHUB_REPOSITORY --verify-tag --draft --title "所依 $env:TAG" --notes "所依 $env:TAG"
          }

          gh release upload $env:TAG $installer $blockmap $latest --repo $env:GITHUB_REPOSITORY --clobber
          gh release edit $env:TAG --repo $env:GITHUB_REPOSITORY --draft=false --latest
