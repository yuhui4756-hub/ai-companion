appId: com.ai-companion.desktop
productName: 所依
artifactName: "suoyi-setup-${version}.${ext}"
directories:
  output: release-v06d
files:
  - dist/**/*
  - dist-electron/**/*
  - build/icons/**/*
  - package.json
asar: true
publish:
  provider: github
  owner: yuhui4756-hub
  repo: ai-companion
win:
  signAndEditExecutable: false
  icon: build/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icons/icon.ico
  uninstallerIcon: build/icons/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 所依
