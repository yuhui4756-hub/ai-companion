appId: com.ai-companion.desktop
productName: 所依
directories:
  output: release-v06c
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
asar: true
publish:
  provider: generic
  url: http://127.0.0.1:51730/updates/
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "所依 Setup ${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 所依
